name: Android Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'VITE_API_URL (Optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React App
        run: npm run build
        env:
          VITE_API_URL: ${{ github.event.inputs.api_url || secrets.VITE_API_URL }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: android/app/debug.keystore
          key: ${{ runner.os }}-debug-keystore-v1

      - name: Setup Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "RELEASE_KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          elif [ -f "android/app/debug.keystore" ]; then
            echo "Using cached debug keystore"
            echo "RELEASE_KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          else
            echo "Generating new debug keystore..."
            keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
            echo "RELEASE_KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          if [ "$RELEASE_KEYSTORE_EXISTS" = "true" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automatic build of N Box Android APK.

            Configured API URL: `${{ github.event.inputs.api_url || secrets.VITE_API_URL || 'None (using /api)' }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
