name: Android Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React App
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://nhub-pi.vercel.app/api' }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup Release Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "RELEASE_KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "RELEASE_KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          if [ "$RELEASE_KEYSTORE_EXISTS" = "true" ]; then
            ./gradlew assembleRelease \
              -PRELEASE_STORE_FILE=release.keystore \
              -PRELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -PRELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
              -PRELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          else
            ./gradlew assembleDebug
          fi
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: android/app/build/outputs/apk/**/*.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
          tag_name: ${{ steps.package-version.outputs.tag }}
          name: Release ${{ steps.package-version.outputs.tag }}
          body: |
            Automatic build of Nature Toolbox Android APK.

            Version: `${{ steps.package-version.outputs.version }}`
            Build Number: `${{ github.run_number }}`
            Configured API URL: `${{ secrets.VITE_API_URL || 'https://nhub-pi.vercel.app/api' }}`
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
